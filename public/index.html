<!DOCTYPE html>
<html lang="%LANG_ISO_CODE%">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover"
    />
    <title>%WEB_TITLE%</title>
    <meta
      name="description"
      content="Track your daily habits, build streaks, and unlock achievements. Cross-platform on iOS, Android, and web."
    />
    <meta name="theme-color" content="#451ebb" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Lagan" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Lagan लगन" />
    <meta property="og:description" content="Build habits, track progress, earn badges." />
    <meta property="og:image" content="/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Lagan लगन" />
    <meta name="twitter:description" content="Build habits, track progress, earn badges." />
    <meta name="twitter:image" content="/og-image.png" />

    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <style id="expo-reset">
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        overflow: hidden;
        background: #edeeef;
      }
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #0f0f14;
        }
      }
      @media (max-width: 480px) {
        body {
          background: #f8f9fa;
        }
        @media (prefers-color-scheme: dark) {
          body {
            background: #0f0f14;
          }
        }
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
