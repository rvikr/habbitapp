      - '-t'
      - 'gcr.io/lagan-495719/lagan'
      - '.'

  # Push image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/lagan-495719/lagan']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - lagan
      - '--image=gcr.io/lagan-495719/lagan'
      - '--region=asia-south2'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'

images:
